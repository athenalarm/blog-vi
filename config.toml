# Website Basic Information
baseURL = "https://blogvi.athenalarm.com/"    # Placeholder URL, change to Cloudflare Pages URL after deployment
title = "Blog của Athenalarm"
languageCode = "vi"
theme = "ananke"

# --- 新增：SEO 与 索引 增强配置 ---
canonifyURLs = true
uglyURLs = false

[sitemap]
  changefreq = "weekly"
  priority = 0.5
  filename = "sitemap.xml"

[taxonomies]
  category = "categories"
  tag = "tags"
# -------------------------------

# Author Information (optional)
[author]
  name = "Athenalarm"
  email = "info@athenalarm.com"

# Website Menu (optional)
[menu]
  [[menu.main]]
    identifier = "home"
    name = "Trang chủ"
    url = "/"
    weight = 1

  [[menu.main]]
    identifier = "posts"
    name = "Bài viết"
    url = "/posts/"
    weight = 2

  [[menu.main]]
    identifier = "contact"
    name = "Liên hệ"
    url = "/contact/"
    weight = 3

# ---------------------------
# Home Page Settings
# ---------------------------
paginate = 5          # 首页显示最新 5 篇文章
mainSections = ["posts"]  # Home 页面只显示 type 为 "posts" 的文章
